basePath: /
definitions:
  controller.LogEntry:
    properties:
      event_id:
        type: string
      event_time:
        description: 'RFC3339形式 JST (例: "2006-01-02T15:04:05+09:00")'
        type: string
      participate_users:
        description: 参加メンバの stay_watch_id（空可）
        items:
          type: integer
        type: array
      room_users:
        description: 在室メンバの stay_watch_id（空可）
        items:
          type: integer
        type: array
      status_id:
        type: integer
    required:
    - event_id
    - event_time
    - status_id
    type: object
  controller.RegisterLogsRequest:
    properties:
      logs:
        items:
          $ref: '#/definitions/controller.LogEntry'
        minItems: 1
        type: array
    required:
    - logs
    type: object
  controller.RegisterStatusesRequest:
    properties:
      names:
        items:
          type: string
        minItems: 1
        type: array
    required:
    - names
    type: object
  service.BoardActivity:
    properties:
      headcount:
        type: integer
      likelihood:
        description: '"high" | "mid" | "low"'
        type: string
      name:
        type: string
    type: object
  service.BoardData:
    properties:
      currentTime:
        type: string
      presence:
        $ref: '#/definitions/service.BoardPresence'
      timeBlocks:
        items:
          $ref: '#/definitions/service.BoardTimeBlock'
        type: array
    type: object
  service.BoardPerson:
    properties:
      arrival:
        description: '"likely" | "maybe"'
        type: string
      avatarUrl:
        type: string
      name:
        type: string
    type: object
  service.BoardPresence:
    properties:
      members:
        items:
          $ref: '#/definitions/service.BoardPresentMember'
        type: array
    type: object
  service.BoardPresentMember:
    properties:
      avatarUrl:
        type: string
      name:
        type: string
    type: object
  service.BoardTimeBlock:
    properties:
      activities:
        items:
          $ref: '#/definitions/service.BoardActivity'
        type: array
      id:
        description: '"noon" | "evening" | "night"'
        type: string
      isNow:
        type: boolean
      label:
        type: string
      people:
        items:
          $ref: '#/definitions/service.BoardPerson'
        type: array
      range:
        type: string
    type: object
host: localhost:8085
info:
  contact: {}
  description: 研究室の来訪予測・活動管理のためのAPI
  title: Stay Watch Slackbot API
  version: "1.0"
paths:
  /api/activities/probabilities:
    get:
      parameters:
      - description: '曜日 (MySQL WEEKDAY形式: 0=月, 6=日)。省略時は今日の曜日'
        in: query
        name: weekday
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: 全活動の時間帯別発生確率を取得
      tags:
      - activities
  /api/board:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/service.BoardData'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: 共有モニター用の表示データを取得
      tags:
      - board
  /api/events:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Event一覧を取得
      tags:
      - events
  /api/events/{id}/probability:
    get:
      parameters:
      - description: イベントID
        in: path
        name: id
        required: true
        type: integer
      - description: '曜日 (MySQL WEEKDAY形式: 0=月, 6=日)'
        in: query
        name: weekday
        required: true
        type: integer
      - description: '時刻 (HH:MM形式, JST。デフォルト: 現在時刻)'
        in: query
        name: time
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: イベントの発生確率を取得
      tags:
      - events
  /api/logs:
    post:
      consumes:
      - application/json
      parameters:
      - description: 登録するログエントリのリスト
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/controller.RegisterLogsRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: ログを一括登録
      tags:
      - logs
  /api/statuses:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Status一覧を取得
      tags:
      - statuses
    post:
      consumes:
      - application/json
      parameters:
      - description: 登録するStatus名のリスト
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/controller.RegisterStatusesRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Statusを一括登録
      tags:
      - statuses
swagger: "2.0"
